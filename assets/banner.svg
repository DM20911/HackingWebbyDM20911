<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="HackingWebbyDM20911 — Offensive Web Hacking Copilot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070a"/>
      <stop offset="50%" stop-color="#0a1018"/>
      <stop offset="100%" stop-color="#02050a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ff66"/>
      <stop offset="50%"  stop-color="#33ff99"/>
      <stop offset="100%" stop-color="#00ddaa"/>
    </linearGradient>
    <linearGradient id="redaccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#ff3344"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#0e3520" stroke-width="0.6" opacity="0.45"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>

  <!-- Scanlines -->
  <g opacity="0.07" stroke="#00ff99">
    <line x1="0" y1="40" x2="1280" y2="40"/>
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="280" x2="1280" y2="280"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
  </g>

  <!-- Matrix-style background glyphs -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" fill="#1a6b3a" opacity="0.45">
    <text x="20" y="30">01101000 01100001 01100011 01101011</text>
    <text x="20" y="345">$&gt; nuclei -u target.cl -severity critical,high</text>
    <text x="900" y="30">[+] 0x90 0x90 0x90 0xCC</text>
    <text x="950" y="345">[+] root@kali ~/recon</text>
    <text x="40" y="280" opacity="0.25">SELECT * FROM users WHERE id='1' OR '1'='1' --</text>
    <text x="780" y="68" opacity="0.30">&lt;svg/onload=alert(1)&gt;</text>
    <text x="60" y="60" opacity="0.3">curl -s -H "X-Forwarded-For: 127.0.0.1" $TARGET</text>
    <text x="700" y="320" opacity="0.3">CVE-2024-XXXX  CVSS:9.8  CWE-89</text>
  </g>

  <!-- Window-chrome dots (terminal feel) -->
  <g transform="translate(60,80)">
    <circle cx="0"  cy="0" r="7" fill="#ff5f56"/>
    <circle cx="22" cy="0" r="7" fill="#ffbd2e"/>
    <circle cx="44" cy="0" r="7" fill="#27c93f"/>
  </g>

  <!-- Prompt line above title -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="18">
    <text x="60" y="115" fill="#33ff66" filter="url(#glow-soft)">root@dm20911</text>
    <text x="200" y="115" fill="#cccccc">:</text>
    <text x="210" y="115" fill="#7ab8ff">~/offensive</text>
    <text x="340" y="115" fill="#cccccc">$ ./</text>
  </g>

  <!-- Main title -->
  <g filter="url(#glow)">
    <text x="60" y="195" font-family="ui-monospace, Menlo, Consolas, monospace"
          font-size="62" font-weight="700" fill="url(#neon)" letter-spacing="2">
      HackingWeb<tspan fill="#ff3344">by</tspan>DM20911
    </text>
  </g>
  <!-- Cursor -->
  <rect x="1080" y="160" width="20" height="48" fill="#00ff66">
    <animate attributeName="opacity" values="1;0;1" dur="1.05s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text x="60" y="240" font-family="ui-monospace, Menlo, Consolas, monospace"
        font-size="20" fill="#9be5b8" letter-spacing="1">
    // Offensive Web Hacking Copilot
  </text>

  <!-- Tag chips -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14" fill="#0a0e14">
    <g transform="translate(60,270)">
      <rect width="98"  height="28" rx="14" fill="#00ff66" opacity="0.92"/>
      <text x="14" y="19" font-weight="700">RECON</text>
    </g>
    <g transform="translate(168,270)">
      <rect width="120" height="28" rx="14" fill="#33ccff" opacity="0.92"/>
      <text x="14" y="19" font-weight="700">EXPLOIT</text>
    </g>
    <g transform="translate(298,270)">
      <rect width="160" height="28" rx="14" fill="#ffcc00" opacity="0.92"/>
      <text x="14" y="19" font-weight="700">ATTACK-CHAIN</text>
    </g>
    <g transform="translate(468,270)">
      <rect width="142" height="28" rx="14" fill="#ff5fff" opacity="0.92"/>
      <text x="14" y="19" font-weight="700">AI-ASSISTED</text>
    </g>
    <g transform="translate(620,270)">
      <rect width="146" height="28" rx="14" fill="url(#redaccent)" opacity="0.95"/>
      <text x="14" y="19" font-weight="700" fill="#ffffff">SENIOR-REPORT</text>
    </g>
    <g transform="translate(776,270)">
      <rect width="166" height="28" rx="14" fill="#1a1a1a" stroke="#00ff66" stroke-width="1.5"/>
      <text x="14" y="19" font-weight="700" fill="#00ff66">OWASP · ATT&amp;CK</text>
    </g>
  </g>

  <!-- Status bar bottom -->
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" fill="#8aa4ad">
    <text x="60"   y="325">[v1.0]</text>
    <text x="115"  y="325">claude-code · claude-desktop · cli</text>
    <text x="360"  y="325" fill="#00ff66">●</text>
    <text x="376"  y="325">authenticated · scope:offensive · methodology:hybrid</text>
    <text x="1180" y="325" fill="#33ccff">by dm20911</text>
  </g>

  <!-- Decorative target reticle -->
  <g transform="translate(1140,160)" stroke="#00ff66" stroke-width="1.4" fill="none" opacity="0.85">
    <circle r="48" />
    <circle r="32" />
    <circle r="16" />
    <line x1="-60" y1="0" x2="-22" y2="0"/>
    <line x1="22"  y1="0" x2="60"  y2="0"/>
    <line x1="0" y1="-60" x2="0" y2="-22"/>
    <line x1="0" y1="22"  x2="0" y2="60"/>
    <circle r="3" fill="#ff3344" stroke="none"/>
  </g>
</svg>
